name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 같은 브랜치에 push가 연속으로 들어오면 이전 실행은 취소 (큐 점유 방지)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # `npm run build`가 `tsc -b && vite build`라서 타입체크와 빌드가 같이 돈다.
      # Supabase/OpenWeather 등 외부 키 없이도 빌드 자체는 성공해야 정상.
      - name: Build
        run: npm run build
